<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正規表現練習アプリ</title>
</head>
<body>
  <h1>正規表現練習アプリ</h1>
  <main>
    <div>
      <strong><span id="result"></span></strong>
    </div>
    <form>
      <div class="container">
        正規表現　: <input type="text" name="pattern" id="pattern" size="30" />
        オプション: <input type="text" name="option" id="option" size="5" />
      </div>
      <div class="container">
        対象文字列: <input type="text" name="target" id="pattern" size="30" />
      </div>
      <div class="container">
          <button id="test">テスト</button>
      </div>
    </form>
  </main>
  <script src="regexp_trainer.js"></script>
</body>
</html>
